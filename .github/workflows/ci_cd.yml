name: Chatbot Tutor CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install testing tools
        pip install pytest httpx

    - name: Run Linter (Flake8 / Ruff)
      run: |
        pip install ruff
        ruff check src/

    - name: Test Code Compilation
      run: |
        python -m py_compile src/week1/*.py
        python -m py_compile src/week2/*.py
        python -m py_compile src/week3/*.py
        python -m py_compile src/week4/*.py
        python -m py_compile src/week5/*.py
        python -m py_compile src/week6/*.py
        python -m py_compile src/week8/*.py
        python -m py_compile src/week9/*.py

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image (Dry Run)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: suyasharai/chatbot-tutor-api:latest
